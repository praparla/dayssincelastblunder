<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Days Since Last Blunder — Chicago Sky</title>
  <meta name="description" content="Tracking the Chicago Sky front office's decision-making. How long since the last blunder?">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav-logo">DSLB</span>
    <span class="nav-subtitle">Chicago Sky Blunder Tracker</span>
  </nav>

  <main>
    <section class="hero">
      <p class="hero-label">Days Since Last Blunder</p>
      <div class="hero-number" id="days-count"></div>
      <p class="hero-blunder" id="latest-blunder"></p>
    </section>

    <section class="table-section">
      <h2 class="section-title">The Blunder Log</h2>
      <p class="section-subtitle">Sorted by recency. Severity rated 1–5.</p>
      <div class="table-wrapper">
        <table id="blunder-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Blunder</th>
              <th>Responsible</th>
              <th>Severity</th>
            </tr>
          </thead>
          <tbody id="blunder-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>This is a fan-made accountability tracker. Not affiliated with the WNBA or Chicago Sky.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
